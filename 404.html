
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palette Constants */
            --bg-paper: #fdfaf6;
            --ink: #1c1917;
            
            /* Accent Pops */
            --coral: #ff7675;
            --mustard: #fed330;
            --mint: #26de81;
            --lavender: #a55eea;
            --sky: #45aaf2;

            /* Organic Border Radii */
            --organic-radius-1: 255px 15px 225px 15px / 15px 225px 15px 255px;
            --organic-radius-2: 20px 255px 30px 225px / 225px 15px 255px 15px;
            --organic-radius-3: 15px 15px 15px 15px / 15px 15px 15px 15px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
            /* Subtly grainy grid pattern to simulate physical paper notebook layout */
            background-image: 
                linear-gradient(rgba(28, 25, 23, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(28, 25, 23, 0.04) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Decorative Scrapbook Elements */
        .tape {
            position: absolute;
            background: rgba(254, 211, 48, 0.7);
            padding: 6px 32px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-left: 3px dashed var(--ink);
            border-right: 3px dashed var(--ink);
            transform: rotate(-5deg);
            top: 40px;
            left: 40px;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            font-family: 'Space Grotesk', sans-serif;
        }

        .sticker {
            position: absolute;
            background: var(--mint);
            border: 2px solid var(--ink);
            padding: 10px;
            border-radius: 50%;
            bottom: 40px;
            right: 50px;
            transform: rotate(12deg);
            box-shadow: 4px 4px 0px var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Error Dashboard Card Layout */
        .error-container {
            text-align: center;
            max-width: 580px;
            background: #ffffff;
            border: 3px solid var(--ink);
            border-radius: var(--organic-radius-2);
            padding: 50px 40px;
            box-shadow: 10px 10px 0px var(--ink);
            position: relative;
            transform: rotate(-0.5deg);
            transition: transform 0.2s ease;
        }

        .error-container:hover {
            transform: rotate(0.5deg);
        }

        /* 404 Big Display Badge */
        .error-code-badge {
            display: inline-block;
            background: var(--coral);
            border: 3px solid var(--ink);
            border-radius: var(--organic-radius-1);
            padding: 10px 40px;
            transform: rotate(-3deg) translateY(-20px);
            box-shadow: 6px 6px 0px var(--ink);
            margin-bottom: 20px;
        }

        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 110px;
            font-weight: 800;
            color: #ffffff;
            -webkit-text-stroke: 2px var(--ink);
            text-shadow: 4px 4px 0px var(--ink);
            line-height: 0.95;
            letter-spacing: -2px;
        }

        .error-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 38px;
            font-weight: 800;
            margin: 20px 0 15px 0;
            color: var(--ink);
            position: relative;
            display: inline-block;
        }

        /* Felt tip highlight effect under header */
        .error-title::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: -5px;
            right: -5px;
            height: 12px;
            background: rgba(69, 171, 242, 0.3);
            z-index: -1;
            transform: skewX(-10deg);
        }

        .error-message {
            color: var(--ink);
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 35px;
            line-height: 1.6;
            opacity: 0.9;
            background: #fdfaf6;
            padding: 15px;
            border: 2px dashed rgba(28, 25, 23, 0.2);
            border-radius: 8px;
        }

        /* Mechanical Click Tactile Button */
        .btn-home {
            font-family: 'Space Grotesk', sans-serif;
            padding: 16px 36px;
            background: var(--mustard);
            border: 3px solid var(--ink);
            border-radius: var(--organic-radius-3);
            color: var(--ink);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 6px 6px 0px var(--ink);
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .btn-home:hover {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px var(--ink);
            background: #fff200;
        }

        .btn-home:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px var(--ink);
        }

        .btn-icon {
            font-size: 22px;
            transition: transform 0.2s ease;
        }

        .btn-home:hover .btn-icon {
            transform: scale(1.2) rotate(-8deg);
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .error-container {
                padding: 40px 20px;
            }
            .error-code {
                font-size: 80px;
            }
            .error-title {
                font-size: 28px;
            }
            .tape, .sticker {
                display: none; /* Hide messy overlapping items on compact screens */
            }
        }
    </style>
</head>
<body>

    <div class="tape" aria-hidden="true">System Warning //</div>
    <div class="sticker" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1c1917" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
    </div>

    <div class="error-container">
        
        <div class="error-code-badge">
            <div class="error-code">404</div>
        </div>

        <h1 class="error-title">Page Not Found</h1>
        
        <p class="error-message">
            The endpoint you're looking for doesn't exist or has been moved.
            Please check the URL and try again.
        </p>

        <a href="/" class="btn-home">
            <span class="btn-icon">🏠</span>
            <span>Go Home</span>
        </a>

    </div>

</body>
</html>
